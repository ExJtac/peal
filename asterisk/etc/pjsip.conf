;
; pjsip.conf — TRANSPORTS + GLOBALS ONLY.
;
; IMPORTANT: endpoints, auths, aors, identifies, and registrations live in Postgres
; (schema "asterisk", tables ps_*) and are read live via realtime/ARA (see sorcery.conf +
; extconfig.conf). "Provision an extension/trunk" = a DB write by the control plane's
; psWriter.ts — NEVER an edit to this file. Transports + the global section CANNOT be
; realtime, so they live here.
;

; =======================================================================================
; GLOBAL
; =======================================================================================
[global]
type = global
user_agent = pbx
; Try IP identification (trunks/Telnyx via ps_endpoint_id_ips) BEFORE username auth
; (phones). This ordering matters: inbound trunk traffic is matched by source IP, phones
; by From-user + auth.
endpoint_identifier_order = ip,username
; Default is fine; document the knob. Raise only if you chain many forwards.
max_forwards = 70
; No default outbound endpoint — the control plane always originates explicitly.
; default_outbound_endpoint =

; =======================================================================================
; TRANSPORTS
; =======================================================================================

; --- UDP (primary SIP transport for phones + most ITSPs) ---
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
; --- OFFICE / NAT (uncomment + set for a deployment behind NAT) ---
; When Asterisk sits behind a router/firewall with a public IP, advertise the public
; address in SIP/SDP so far-end devices send media to the right place (fixes one-way audio).
; external_media_address = YOUR.PUBLIC.IP
; external_signaling_address = YOUR.PUBLIC.IP
; local_net = 192.168.0.0/16
; local_net = 10.0.0.0/8
; local_net = 172.16.0.0/12
; In the bridged/office Lima setup the VM has a real LAN IP, so intra-LAN phones need NO
; external_* — only set these if SIP traverses NAT to a public trunk that requires it.

; --- TCP (some phones/trunks prefer or require TCP) ---
[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

; --- WS (WebRTC browser softphones — plaintext WebSocket served on the http.conf port at /ws) ---
; Dev-friendly: no TLS cert needed for local testing. Media is still DTLS-SRTP (webrtc=yes on
; the endpoint). For OFFICE/PROD switch browser clients to WSS ([transport-wss] + http.conf TLS).
; The ws transport REQUIRES a bind (Asterisk validates it), but the actual WebSocket is served
; by res_http_websocket on the HTTP server (http.conf :8088) — this bind associates the two.
[transport-ws]
type = transport
protocol = ws
bind = 0.0.0.0:8088

; --- WSS (secure WebSocket for prod WebRTC; needs http.conf TLS + a cert) ---
; [transport-wss]
; type = transport
; protocol = wss

; --- TLS (recommended for office/prod SIP signaling encryption; pair with SRTP media) ---
; [transport-tls]
; type = transport
; protocol = tls
; bind = 0.0.0.0:5061
; cert_file = /etc/asterisk/keys/asterisk.pem
; priv_key_file = /etc/asterisk/keys/asterisk.key
; ca_list_file = /etc/asterisk/keys/ca.crt
; method = tlsv1_2
; ; external_media_address / external_signaling_address / local_net as above if behind NAT.
