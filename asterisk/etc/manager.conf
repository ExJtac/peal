;
; manager.conf — Asterisk Manager Interface (AMI).
;
; We drive call CONTROL over ARI. AMI is enabled here for ONE narrow purpose the ARI API
; can't do: pushing a SIP `NOTIFY Event: check-sync` to a phone (reboot / re-provision) via
; the `PJSIPNotify` action. The control plane's AMI client is `src/telephony/ami.ts`.
;
; The [pbx-ctl] secret MUST equal the control plane's AMI_PASSWORD env var (see .env.example).
; Replace CHANGEME_AMI_PASSWORD in the VM's /etc/asterisk/manager.conf (mirror ari.conf).
;
[general]
enabled = yes
port = 5038

; DEV: bind on all interfaces so the Mac-native control plane can reach AMI (mirrors
; http.conf's 0.0.0.0:8088 for ARI). Lima forwards Mac 127.0.0.1:5038 -> the guest, and the
; [pbx-ctl] permit ACL below still restricts who may authenticate.
;
; OFFICE / PROD: the control plane runs on the SAME VM as Asterisk, so bind to loopback:
;     bindaddr = 127.0.0.1
bindaddr = 0.0.0.0

; TLS for AMI (office/prod) — pair with a cert like http.conf's TLS block.
; tlsenable = yes
; tlsbindaddr = 0.0.0.0:5039
; tlscertfile = /etc/asterisk/keys/asterisk.pem
; tlsprivatekey = /etc/asterisk/keys/asterisk.key

; ---------------------------------------------------------------------------------------
; Control-plane user. Least privilege: only the classes PJSIPNotify needs.
;   - deny everything, then permit only the loopback the Lima forward arrives on.
;   - OFFICE/bridged: add  permit = <mac-lan-ip>/255.255.255.255
;   - `system` write class is required for PJSIPNotify; `call` covers channel visibility.
; ---------------------------------------------------------------------------------------
[pbx-ctl]
secret = CHANGEME_AMI_PASSWORD
deny = 0.0.0.0/0.0.0.0
permit = 127.0.0.1/255.255.255.255
read = system,call
write = system,call
