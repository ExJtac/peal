;
; odbc.ini — unixODBC DSN definition.
; Installed to /etc/odbc.ini by build-asterisk.sh (copied from here).
;
; DSN "asterisk-pg" points at the Mac's Postgres (DB "pbx") from inside the VM.
;
; >>> SET MAC_HOST_IP <<<  Replace MAC_HOST_IP below with the Mac's IP as seen from the
; guest. With the vzNAT dev network that host gateway is typically 192.168.64.1 (confirm
; inside the VM with:  ip route | grep default  ). With bridged/office networking, use
; the Mac's real LAN IP. build-asterisk.sh prints a reminder about this.
;
[asterisk-pg]
Description = PBX Postgres (Mac host) — Asterisk realtime ps_*, cdr, cel
Driver = PostgreSQL
Servername = MAC_HOST_IP
Port = 5432
Database = pbx
Username = james
Password =
Protocol = 7.4
; CRITICAL: put the "asterisk" schema first on the search_path so res_config_odbc's
; unqualified SELECTs (e.g. SELECT ... FROM ps_endpoints) resolve to asterisk.ps_endpoints,
; while our Prisma tables stay in public. cdr_pgsql/cel_pgsql connect natively (not via
; this DSN) and set their own schema=asterisk in cdr_pgsql.conf / cel_pgsql.conf.
; standard_conforming_strings OFF avoids PostgreSQL error 22025 "invalid escape string" on
; res_config_odbc's realtime LIKE queries (which otherwise crash res_pjsip on load).
ConnSettings = SET search_path TO asterisk,public;SET standard_conforming_strings TO off
; Keep the driver from doing surprising type coercions on our varchar/enum columns.
BoolsAsChar = 0
UseServerSidePrepare = 0
; Row-versioning off; we don't rely on it for realtime reads.
RowVersioning = 0
