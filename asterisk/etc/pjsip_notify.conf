;
; pjsip_notify.conf — named SIP NOTIFY payloads for `pjsip send notify <name> endpoint <e>`
; and the AMI `PJSIPNotify` action's `Option:` form.
;
; These push a config resync / reboot to a registered phone. Most SIP desk phones (Fanvil,
; Yealink, Grandstream, Polycom) honor `Event: check-sync`; `reboot=true` forces a reboot,
; `reboot=false` re-reads config without rebooting. `Event=>` sets the Event header; `\;`
; escapes the config comment char so the emitted header is `Event: check-sync;reboot=...`.
;
; res_pjsip_notify does NOT allow a [general] section — only named notify categories.
;
; The control plane (src/telephony/ami.ts) sends the equivalent via a `Variable:` header,
; which is version-independent; these named payloads back the CLI + manual path.
;

; Re-read provisioning config WITHOUT rebooting ("force provision").
[resync]
Event=>check-sync\;reboot=false

; Reboot the phone (it re-provisions on boot).
[reboot]
Event=>check-sync\;reboot=true
