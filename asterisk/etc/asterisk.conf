;
; asterisk.conf — core paths + runtime options for the custom AI-PBX engine.
; Installed to /etc/asterisk/asterisk.conf by build-asterisk.sh.
;

[directories](!)
astctldir => /var/run/asterisk
astetcdir => /etc/asterisk
astmoddir => /usr/lib/asterisk/modules
astvarlibdir => /var/lib/asterisk
astdbdir => /var/lib/asterisk
astkeydir => /var/lib/asterisk
astdatadir => /var/lib/asterisk
astagidir => /var/lib/asterisk/agi-bin
astspooldir => /var/spool/asterisk
astrundir => /var/run/asterisk
astlogdir => /var/log/asterisk
astsbindir => /usr/sbin

[options]
; Run as the unprivileged asterisk user (created by build-asterisk.sh).
runuser = asterisk
rungroup = asterisk

defaultlanguage = en
documentation_language = en_US

; Verbosity/debug are modest by default; raise at the CLI when troubleshooting.
verbose = 3
debug = 0

; Don't fork history/color noise; keep timestamps in the logs.
dumpcore = yes
hideconnect = yes
lockconfdir = no

; Live dangerously = no. Keep module loads explicit-ish via modules.conf.
; (transmit_silence helps some codecs during app playback/record gaps.)
transmit_silence = yes

; Emergency-call posture: we never want the engine wedged. Watchdog-friendly.
; systemd Restart=always handles crash recovery (see build-asterisk.sh unit).
