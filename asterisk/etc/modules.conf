;
; modules.conf — module load policy.
;
; Strategy: autoload everything that was compiled in (menuselect already restricted the
; module set at build time), but PRELOAD the ODBC layer so realtime (ps_*) config is
; available before res_pjsip / sorcery try to read endpoints/auths/aors from Postgres.
;
[modules]
autoload = yes

; --- Preload realtime/ODBC BEFORE anything that reads config from the DB ---
; res_odbc     : the ODBC connection pool (DSN "asterisk-pg" -> Mac Postgres).
; res_config_odbc: the realtime engine backing extconfig.conf families (ps_*).
preload = res_odbc.so
preload = res_config_odbc.so

; --- Explicitly do not load legacy/unwanted drivers ---
; chan_sip is removed in Asterisk 22 (PJSIP-only), but keep the noload as a guard in
; case an older tree is ever built here. We are strictly PJSIP.
noload = chan_sip.so
; We drive everything over ARI; the built-in manager (AMI) is not used.
noload = manager.so
; No SCCP/Skinny, no MGCP, no IAX in this deployment.
noload = chan_skinny.so
noload = chan_mgcp.so
noload = chan_iax2.so
