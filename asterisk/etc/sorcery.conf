;
; sorcery.conf — bind PJSIP object types to the realtime (ARA) families from extconfig.conf.
;
; "realtime,<family>" tells sorcery to back that object type with the ODBC family. Objects
; are read on demand (endpoint/auth/aor lookups need no reload); after identify/registration
; writes, the control plane triggers a targeted `res_pjsip reload` via ARI (reconcile.ts).
;
; Contacts stay DYNAMIC/Asterisk-managed (registrar writes them) — do NOT override the
; contact object here; res_pjsip_registrar handles ps_contacts through the family map.
;

[res_pjsip]
endpoint = realtime,ps_endpoints
auth = realtime,ps_auths
aor = realtime,ps_aors
domain_alias = realtime,ps_domain_aliases

[res_pjsip_endpoint_identifier_ip]
identify = realtime,ps_endpoint_id_ips

[res_pjsip_outbound_registration]
registration = realtime,ps_registrations
