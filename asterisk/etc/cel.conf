;
; cel.conf — Channel Event Logging engine (generic settings).
; Storage backend is cel_pgsql (see cel_pgsql.conf). CEL gives per-leg event granularity
; that our CallRecord overlay uses to reconstruct multi-party calls.
;
[general]
enable = yes
; Keep dateformat ISO-ish for easy joins with our public.* tables.
dateformat = %Y-%m-%d %H:%M:%S
; Minimal-but-useful event set: the lifecycle events needed to correlate legs.
apps = dial,park,queue,voicemail,stasis
events = CHAN_START,CHAN_END,ANSWER,HANGUP,BRIDGE_ENTER,BRIDGE_EXIT,APP_START,APP_END
