;
; logger.conf — log channels.
;
; The dedicated "security" log is important: fail2ban (Phase 1 hardening / toll-fraud
; mitigation) watches /var/log/asterisk/security for failed auth + registration abuse.
;
[general]
dateformat = %F %T.%3q
; Append PID so restarts are visible in the logs.
appendhostname = no
use_callids = yes

[logfiles]
; console output (what you see under `asterisk -rvvv`)
console => notice,warning,error,verbose
; general activity + errors
messages => notice,warning,error
; full firehose (rotate aggressively in prod)
full => notice,warning,error,debug,verbose,dtmf,fax
; SECURITY log — auth failures, invalid-endpoint attempts, etc. fail2ban tails this.
security => security
