;
; rtp.conf — RTP media port range + (office) NAT traversal knobs.
;
[general]
; Media port range. 10000-20000 is generous for <=25 phones; if you firewall the VM,
; open this UDP range (plus 5060 SIP). Keep it consistent with any router port-forwards.
rtpstart = 10000
rtpend = 20000

; --- OFFICE / NAT media traversal (uncomment + configure for a NAT'd deployment) ---
; STUN helps discover the public-facing mapping; ICE negotiates the best media path.
; Intra-LAN (bridged Lima, phones on the same subnet) does NOT need these.
; stunaddr = stun.l.google.com:19302
; icesupport = yes
; ; For a symmetric-NAT office you may also pin a TURN relay:
; ; turnaddr = turn.example.com:3478
; ; turnusername = user
; ; turnpassword = secret
