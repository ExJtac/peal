;
; cel_pgsql.conf — write CEL events directly to Postgres (native libpq, not ODBC).
; Like cdr_pgsql: its own connection + explicit schema=asterisk. The cel table is created
; by asterisk/sql/002_cdr_cel.sql.
;
; >>> SET MAC_HOST_IP <<<  (the Mac's IP as seen from the VM; same value as odbc.ini)
;
[global]
hostname = MAC_HOST_IP
port = 5432
dbname = pbx
schema = asterisk
table = cel
user = james
; Local trust for superuser "james" -> no password. Set one for office/prod + md5 hba.
password =
encoding = UTF-8
