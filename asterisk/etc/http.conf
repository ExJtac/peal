;
; http.conf — Asterisk's built-in mini HTTP server.
;
; This server hosts the ARI REST API + the ARI websocket endpoint (/ari/events).
; res_ari + res_http_websocket bind onto it.
;
[general]
enabled = yes

; DEV: bind on all interfaces so the Mac-native control plane can reach ARI over the
; VM's LAN/vz IP at http://<vm-ip>:8088/ari.
;
; OFFICE / PROD: the control plane runs on the SAME VM as Asterisk (single-VM prod),
; so bind to loopback and expose nothing:
;     bindaddr = 127.0.0.1
bindaddr = 0.0.0.0
bindport = 8088

; Sane server name; prefix keeps ARI/websocket under /ari (default).
servername = pbx
enablestatic = no

; --- TLS (recommended for office/prod; dev over LAN can stay plaintext) ---
; tlsenable = yes
; tlsbindaddr = 0.0.0.0:8089
; tlscertfile = /etc/asterisk/keys/asterisk.pem
; tlsprivatekey = /etc/asterisk/keys/asterisk.key

; Allow larger websocket frames / keep the connection healthy for long-lived ARI events.
websocket_write_timeout = 100
session_keep_alive = 15000
