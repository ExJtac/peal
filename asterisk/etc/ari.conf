;
; ari.conf — Asterisk REST Interface config.
;
; Our Node control plane drives ALL call logic over ARI. Two connection models exist:
;
;   (A) INBOUND (the app connects IN)  — WORKING DEFAULT below.
;       The control plane opens ws://<vm-ip>:8088/ari/events?app=pbx-app and makes
;       REST calls to http://<vm-ip>:8088/ari/*. Authenticated as user [pbx].
;
;   (B) OUTBOUND websocket (Asterisk dials OUT to us) — PREFERRED for prod, so nothing
;       inbound is exposed on the engine. Configured further down, COMMENTED with a TODO
;       because the exact syntax depends on the Asterisk 22 point release
;       (res_ari_outbound_websocket + res_websocket_client landed in 22.2.0).
;
; The [pbx] password MUST equal the control plane's ARI_PASSWORD env var.
;

[general]
enabled = yes
; Pretty-print JSON in dev for readable event dumps; set to no in prod for less overhead.
pretty = yes
; The ARI websocket allow-list is a browser-CORS Origin check, enforced ONLY when an Origin
; header is present. Our control-plane client (ariClient.ts fetch + connection.ts ws) sends NO
; Origin, so it is unaffected — this simply blocks a rogue browser from opening the ARI ws. The
; browser SOFTPHONE uses the separate pjsip /ws (http.conf), not ARI. Set to the app origin(s);
; prod: your real APP_URL (or run outbound-ws mode and drop inbound entirely).
allowed_origins = http://localhost:3001,http://localhost:3000
; Emit the Asterisk-standard "channelvars" so per-call state stashed in channel
; variables (CALLREC_ID, DEST_TYPE, IVR_FLOW, ...) rides along on ARI events and
; survives a daemon restart (stateRecovery.ts re-adopts in-flight calls).
channelvars = CALLREC_ID,DEST_TYPE,DEST_ID,IVR_FLOW,IVR_NODE,RETRIES,DID

; ---------------------------------------------------------------------------------------
; (A) INBOUND ARI USER — the working default.
;     Replace CHANGEME_ARI_PASSWORD to match the control plane env ARI_PASSWORD.
; ---------------------------------------------------------------------------------------
[pbx]
type = user
read_only = no
password = CHANGEME_ARI_PASSWORD
; password_format = plain is the default; leave it unless you pre-hash.

; ---------------------------------------------------------------------------------------
; (B) OUTBOUND ARI WEBSOCKET — Asterisk connects OUT to the control plane.  TODO: enable.
; ---------------------------------------------------------------------------------------
; Requires res_ari_outbound_websocket + res_websocket_client (Asterisk >= 22.2.0).
; In this model the control plane runs a ws SERVER on the Mac at ws://MAC_HOST_IP:8090
; and Asterisk dials out to it, registering Stasis app "pbx-app". Nothing inbound on 8088
; needs to be exposed (you can then set http.conf bindaddr = 127.0.0.1).
;
; Step 1 — define a websocket client. Depending on the point release this lives EITHER
; here in ari.conf OR in a dedicated /etc/asterisk/websocket_client.conf. Verify with:
;     asterisk -rx "config show help res_websocket_client"
;
; [pbx-ws-client]
; type = websocket_client
; uri = ws://MAC_HOST_IP:8090/                ; the control plane's outbound-WS server
; protocols = ari
; username = pbx
; password = CHANGEME_ARI_PASSWORD
; tls_enabled = no                            ; use wss:// + yes for office/prod
; connection_type = persistent
; reconnect_interval = 500                    ; ms; control plane also backs off (connection.ts)
; reconnect_attempts = -1                     ; retry forever — dial-tone resilience
;
; Step 2 — bind that client to our Stasis app as an outbound ARI connection:
;
; [pbx-outbound-ws]
; type = outbound_websocket
; websocket_client_id = pbx-ws-client
; apps = pbx-app
; local_ari_user = pbx
;
; NOTE: MAC_HOST_IP = the Mac's IP as seen from inside the VM (see asterisk/etc/odbc.ini
; and lima/pbx.yaml). Confirm the exact field names against the installed release before
; relying on outbound mode in prod; the inbound user [pbx] above works today.
