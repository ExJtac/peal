;
; extconfig.conf — Asterisk Realtime Architecture (ARA) family map.
;
; Maps each PJSIP realtime "family" to the ODBC connection "asterisk-pg" and the backing
; table (in schema "asterisk"; resolved via the DSN's search_path = asterisk,public).
;
; Format:  <family> => odbc,<res_odbc-connection>,<table>
;
; These family names are the canonical PJSIP realtime families; the table names match the
; ps_* tables created by asterisk/sql/001_ps_tables.sql. sorcery.conf then wires the PJSIP
; object types (endpoint/auth/aor/identify/registration) to these families as "realtime".
;
[settings]
ps_endpoints      => odbc,asterisk-pg,ps_endpoints
ps_auths          => odbc,asterisk-pg,ps_auths
ps_aors           => odbc,asterisk-pg,ps_aors
ps_domain_aliases => odbc,asterisk-pg,ps_domain_aliases
ps_endpoint_id_ips => odbc,asterisk-pg,ps_endpoint_id_ips
; ps_contacts is Asterisk-MANAGED (registrations). We map it so contacts persist in the
; DB across restarts, but our control plane NEVER writes this table.
ps_contacts       => odbc,asterisk-pg,ps_contacts
ps_registrations  => odbc,asterisk-pg,ps_registrations
