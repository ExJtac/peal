;
; res_odbc.conf — Asterisk's ODBC connection pool.
;
; Defines the logical ODBC connection "asterisk-pg" that realtime (res_config_odbc) and
; sorcery use to read the ps_* tables live from Postgres. It points at the unixODBC DSN
; also named "asterisk-pg" (defined in /etc/odbc.ini -> asterisk/etc/odbc.ini).
;
; The Mac's Postgres uses local "trust"/peer for superuser "james", so no password is
; needed from the VM PROVIDED pg_hba.conf grants the VM subnet trust (or md5 with a
; password you then add here). Document + lock down for office/prod.
;
[asterisk-pg]
enabled = yes
; "dsn" must match a [section] in /etc/odbc.ini.
dsn = asterisk-pg
username = james
password =
; Keep a warm connection so the first realtime lookup isn't slow.
pre-connect = yes
; Verify the connection is alive before handing it out (guards against stale sockets
; after the Mac sleeps / the network blips).
sanitysql = select 1
connect_timeout = 10
; Postgres via psqlODBC does NOT support native positional-parameter binding the way
; some drivers do; let Asterisk build literal SQL. This is the standard setting for pg.
backslash_is_escape = no
; Force the driver to escape correctly for Postgres string literals.
forcecommit = yes
; Small idle pool is plenty for <=25 phones / low concurrency.
max_connections = 5
