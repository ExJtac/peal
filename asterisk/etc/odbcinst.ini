;
; odbcinst.ini — unixODBC driver registry.
; Installed to /etc/odbcinst.ini by build-asterisk.sh (copied from here).
;
; Registers the PostgreSQL ODBC driver shipped by the Debian package "odbc-postgresql".
;
[PostgreSQL]
Description = PostgreSQL ODBC driver (Unicode)
; --- aarch64 (Apple Silicon Lima guest / arm64 Debian) — DEFAULT ---
Driver = /usr/lib/aarch64-linux-gnu/odbc/psqlodbcw.so
Setup  = /usr/lib/aarch64-linux-gnu/odbc/libodbcpsqlS.so
;
; --- x86_64 (Intel Debian VM) — use these paths instead on amd64 hosts ---
; Driver = /usr/lib/x86_64-linux-gnu/odbc/psqlodbcw.so
; Setup  = /usr/lib/x86_64-linux-gnu/odbc/libodbcpsqlS.so
;
; If unsure of the real path on this host, run:
;     dpkg -L odbc-postgresql | grep psqlodbcw.so
FileUsage = 1
Threading = 2
