;
; cdr_pgsql.conf — write CDRs directly to Postgres.
;
; NOTE: cdr_pgsql connects to Postgres NATIVELY (libpq), NOT through the unixODBC DSN.
; So it needs its own host/db/user AND its own schema selector. Asterisk 22's cdr_pgsql
; DOES support `schema=`, so we target the "asterisk" schema explicitly (the cdr table is
; created there by asterisk/sql/002_cdr_cel.sql).
;
; >>> SET MAC_HOST_IP <<<  (the Mac's IP as seen from the VM; same value as odbc.ini)
;
[global]
hostname = MAC_HOST_IP
port = 5432
dbname = pbx
schema = asterisk
table = cdr
user = james
; Local trust for superuser "james" -> no password. Set one for office/prod + md5 hba.
password =
encoding = UTF-8
; Log the record even if some optional columns are absent (forgiving during schema drift).
; Asterisk maps CDR variables to same-named columns; extra columns are ignored.
