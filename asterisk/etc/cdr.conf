;
; cdr.conf — Call Detail Record engine (generic settings).
; The actual storage backend is cdr_pgsql (see cdr_pgsql.conf).
;
[general]
enable = yes
; Log unanswered + congestion calls too — useful for reporting + toll-fraud forensics.
unanswered = yes
congestion = yes
; Charge time starts at answer (standard billing semantics).
initiatedseconds = no
