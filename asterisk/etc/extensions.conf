;
; extensions.conf — the dialplan.
;
; Business logic lives in the Node ARI app via Stasis(pbx-app). This file is only the
; handoff + native-first 911 + graceful degradation fallback. When the control plane is
; connected, every normal call is handed to Stasis and returns here ONLY if the app is
; down (Stasis exits immediately when no app is registered) — that return path is the
; fallback that keeps basic dial-tone + voicemail alive during a daemon outage.
;
; 911 is native-first: it NEVER enters Stasis, so emergency calling never depends on our
; control plane being up (Kari's Law / RAY BAUM'S posture — see [emergency]).
;

[general]
static = yes
writeprotect = yes
clearglobalvars = no

[globals]
; (intentionally empty — per-call state is stashed in channel variables by the ARI app,
; not in global dialplan variables)

; =======================================================================================
; FROM-INTERNAL — calls originated BY registered phones land here.
; =======================================================================================
[from-internal]
; 911 FIRST, always, before anything can shadow it. Native path, bypasses Stasis.
exten => _911,1,Goto(emergency,911,1)

; Everything else: hand to the control plane. Args: direction=internal, dialed number.
exten => _X.,1,Stasis(pbx-app,internal,${EXTEN})
; Reached ONLY if Stasis returned (app not registered) -> graceful fallback.
 same => n,Goto(fallback-internal,${EXTEN},1)

; =======================================================================================
; FROM-TRUNK — inbound calls from the ITSP (Telnyx etc.) land here.
; =======================================================================================
[from-trunk]
exten => _X.,1,Set(__DID=${EXTEN})
 same => n,Stasis(pbx-app,inbound,${DID})
; Fallback if the app is down: ring the operator extension so inbound PSTN still connects.
 same => n,Dial(PJSIP/1000,20)
 same => n,Hangup()

; =======================================================================================
; FALLBACK-INTERNAL — degraded ext-to-ext dialing when the control plane is offline.
; =======================================================================================
[fallback-internal]
exten => _X.,1,Dial(PJSIP/${EXTEN},20)
 same => n,Goto(vmdirect,${EXTEN},1)

; =======================================================================================
; VMDIRECT — drop the caller into the dialed extension's mailbox (native app_voicemail).
; =======================================================================================
[vmdirect]
exten => _X.,1,VoiceMail(${EXTEN}@default,u)
 same => n,Hangup()

; =======================================================================================
; EMERGENCY — native 911. NEVER Stasis. Independent of the control plane.
; =======================================================================================
; telnyx-emergency (a PJSIP endpoint pointing at the carrier's emergency route) and
; DEVICE_CALLBACK (the dispatchable callback number for the calling device) are
; provisioned PER DEPLOYMENT: telnyx-emergency as a ps_endpoint row, DEVICE_CALLBACK set
; per-device (e.g. on the phone's endpoint or via the fallback set here). Until then the
; Dial target below will fail fast and the NoOp + notification still fire.
[emergency]
exten => 911,1,NoOp(EMERGENCY CALL from ${CALLERID(num)})
 same => n,Set(CALLERID(num)=${DEVICE_CALLBACK})
 same => n,Dial(PJSIP/911@telnyx-emergency,60)
 same => n,System(/etc/asterisk/scripts/e911-notify.sh "${CALLERID(num)}" "${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)}")
 same => n,Hangup()

; =======================================================================================
; PBX-OUTBOUND — helper context the ARI app can push a channel into to reach a trunk if
; it ever needs dialplan-driven origination instead of a REST originate. Kept minimal;
; normal outbound is done by the control plane via ARI originate PJSIP/<num>@<trunk>.
; =======================================================================================
[pbx-outbound]
; Example (commented): dial an E.164 number out a named trunk endpoint.
; exten => _X.,1,Dial(PJSIP/${EXTEN}@telnyx,60)
;  same => n,Hangup()
exten => _X.,1,Hangup()
