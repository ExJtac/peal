;
; musiconhold.conf — Music-on-Hold classes.
;
; The default class streams files from /var/lib/asterisk/moh (Asterisk's standard MOH
; directory). Drop .wav/.sln/.ulaw files there; the control plane references the class by
; name when parking/holding via ARI. Add custom classes per-tenant later if needed.
;
[default]
mode = files
directory = /var/lib/asterisk/moh
; Randomize + loop so callers on hold don't always hear the same opening.
sort = random
